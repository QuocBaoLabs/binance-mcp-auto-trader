<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binance MCP Auto Trader Demo</title>
    <meta
      name="description"
      content="Direct video viewer for the Binance MCP Auto Trader dashboard demo."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #07111f;
        color: #e8f1ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 12%, rgba(243, 186, 47, 0.16), transparent 30%),
          radial-gradient(circle at 80% 18%, rgba(0, 214, 158, 0.14), transparent 30%),
          #07111f;
      }

      main {
        width: min(1180px, 100%);
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }

      img {
        width: 56px;
        height: 56px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 42px);
        line-height: 1.08;
      }

      p {
        margin: 8px 0 0;
        color: #9fb3cc;
      }

      video {
        width: 100%;
        aspect-ratio: 19 / 9;
        display: block;
        border: 1px solid rgba(232, 241, 255, 0.14);
        border-radius: 8px;
        background: #020712;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
      }

      nav {
        margin-top: 16px;
      }

      a {
        color: #00d69e;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="assets/logo.svg" alt="" />
        <div>
          <h1>Binance MCP Auto Trader Demo</h1>
          <p>Watch the dashboard walkthrough directly in your browser.</p>
        </div>
      </header>

      <video controls preload="metadata" poster="assets/logo.svg">
        <source src="assets/demo.mp4" type="video/mp4" />
        Your browser does not support HTML5 video.
      </video>

      <nav>
        <a href="https://github.com/QuocBaoLabs/binance-mcp-auto-trader">
          Back to the GitHub repository
        </a>
      </nav>
    </main>
  </body>
</html>
